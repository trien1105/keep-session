name: GA Engagement Keeper — Auto Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Run every 5 hours to cover 24/7 with 5.5 hours run duration
    - cron: '0 */5 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  keep-alive:
    name: Keep GA Engagement Alive
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GA Engagement Keeper
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_API_SECRET:     ${{ secrets.GA4_API_SECRET }}
          NUM_VIRTUAL_USERS: "25"
          NUM_VIRTUAL_USERS_MIN: "0"
          NUM_VIRTUAL_USERS_MAX: "0"
          SESSION_DURATION_MIN: "480"
          SESSION_DURATION_MAX: "900"
          RUN_DURATION_HOURS: "5.5"
          STAGGER_MAX_MIN: "10"
        run: python ga_keeper.py
