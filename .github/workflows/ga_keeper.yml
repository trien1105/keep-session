name: GA Engagement Keeper — Auto Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Giờ VN (UTC+7): chỉ chạy 08:00 – 23:00
    - cron: '0 1 * * *'   # 08:00 VN
    - cron: '0 6 * * *'   # 13:00 VN
    - cron: '0 11 * * *'  # 18:00 VN

jobs:
  keep-alive:
    name: Keep GA Engagement Alive
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "[Guard] Kiểm tra khung giờ (08:00 – 23:00 VN)"
        id: time_check
        run: |
          VN_HOUR=$(TZ='Asia/Ho_Chi_Minh' date +%H)
          VN_HOUR=$((10#$VN_HOUR))
          echo "Giờ VN: $VN_HOUR:xx"
          if [ $VN_HOUR -lt 8 ] || [ $VN_HOUR -ge 23 ]; then
            echo "⛔ Ngoài khung giờ. Dừng."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Trong khung giờ. Tiếp tục."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.time_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.time_check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      # Không cần cài Playwright nữa — script dùng aiohttp thuần

      - name: Run GA Engagement Keeper
        if: steps.time_check.outputs.skip == 'false'
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_API_SECRET:     ${{ secrets.GA4_API_SECRET }}
          NUM_VIRTUAL_USERS: "16"
          SESSION_DURATION_MIN: "480"
          SESSION_DURATION_MAX: "900"
          RUN_DURATION_HOURS: "5.5"
        run: python ga_keeper.py
