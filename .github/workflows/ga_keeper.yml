name: GA Session Keeper — Auto Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Re-trigger every 5 hours to stay under GitHub's 6h job limit
    - cron: '0 */5 * * *'

jobs:
  keep-alive:
    name: Keep GA Sessions Alive
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run GA Session Keeper
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          NUM_VIRTUAL_USERS: "16"
          SESSION_DURATION_MIN: "120"
          SESSION_DURATION_MAX: "300"
          PAGE_STAY_MIN: "20"
          PAGE_STAY_MAX: "60"
          RUN_FOREVER: "false"
          RUN_DURATION_HOURS: "5.5"
        run: python ga_keeper.py
